name: Export paper artifacts

on:
  workflow_dispatch:
    inputs:
      publish_to_paper_repo:
        description: "Dispatch paper-repo build-results workflow to fetch this raw artifact"
        required: true
        type: boolean
        default: false
      include_mevdt:
        description: "Run MEVDT stages on the self-hosted runner"
        required: true
        default: false
        type: boolean
      dataset_root:
        description: "Optional MEVDT cache root on the runner; defaults to $HOME/.cache/datasets/MEVDT"
        required: false
        default: ""
        type: string
      max_windows:
        description: "Maximum MEVDT label windows to evaluate"
        required: true
        default: "500"
        type: string
      output_artifact_name:
        description: "GitHub Actions artifact name"
        required: true
        default: "paper-output"
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export:
    name: Export canonical paper artifacts
    runs-on: [self-hosted, Linux]
    timeout-minutes: 240

    steps:
      - name: Check out DVS-ENACT
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Ensure MEVDT dataset cache
        id: mevdt-dataset
        if: ${{ inputs.include_mevdt == true }}
        uses: ./.github/actions/ensure-mevdt-dataset
        with:
          dataset-root: ${{ inputs.dataset_root }}
          cache-version: MEVDT-v1
          webdav-url: ${{ secrets.MEVDT_WEBDAV_URL }}
          webdav-user: ${{ secrets.MEVDT_DATA_KEY }}
          webdav-password: ${{ secrets.MEVDT_DATA_PASSWORD }}
          require-curated-layout: true

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install --upgrade --force-reinstall --no-deps \
            "pyrecest @ git+https://github.com/FlorianPfaff/PyRecEst.git@main"

      - name: Run artifact export
        shell: bash
        run: |
          set -euo pipefail

          args=(
            --output-root "${GITHUB_WORKSPACE}/paper-output"
            --max-windows "${{ inputs.max_windows }}"
          )

          if [[ "${{ inputs.include_mevdt }}" == "true" ]]; then
            args+=(--dataset-root "$MEVDT_DATASET_ROOT")
          fi

          python scripts/export_paper_artifacts.py "${args[@]}"

      - name: Run filtered MEVDT evaluation
        if: ${{ inputs.include_mevdt == true }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_mevdt_filtered_tracker_sweep.py \
            --dataset-root "$MEVDT_DATASET_ROOT" \
            --output-root "${GITHUB_WORKSPACE}/paper-output" \
            --max-windows "${{ inputs.max_windows }}"

      - name: Build compact evaluation summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          evidence = Path("paper-output/data/paper_evidence")
          summary = {}

          manifest_path = evidence / "artifact_manifest.json"
          if manifest_path.exists():
              manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
              summary["manifest"] = {
                  "head": manifest.get("repository", {}).get("head"),
                  "parameters": manifest.get("parameters", {}),
                  "summary": manifest.get("summary", {}),
                  "stages": [
                      {"name": stage.get("name"), "status": stage.get("status")}
                      for stage in manifest.get("stages", [])
                  ],
              }

          tracker_path = evidence / "mevdt_tracker_comparison.json"
          if tracker_path.exists():
              tracker = json.loads(tracker_path.read_text(encoding="utf-8"))
              tracker_summary = tracker["summary"]
              summary["mevdt_tracker_comparison"] = {
                  "windows_evaluated": tracker_summary["windows_evaluated"],
                  "constant_position": tracker_summary["constant_position"],
                  "event_cloud_centroid": tracker_summary["event_cloud_centroid"],
                  "baseline": tracker_summary["baseline"],
                  "dvs_enact": tracker_summary["dvs_enact"],
                  "dvs_enact_minus_baseline": tracker_summary["dvs_enact_minus_baseline"],
              }

          filtered_path = evidence / "mevdt_filtered_tracker_sweep.json"
          if filtered_path.exists():
              filtered = json.loads(filtered_path.read_text(encoding="utf-8"))
              summary["mevdt_filtered_tracker_sweep"] = {
                  "window_filter": filtered.get("window_filter"),
                  "filtered_default_summary": filtered["filtered_default_comparison"]["summary"],
                  "sweep_names": [item["name"] for item in filtered["sweep"]],
              }

          synthetic_path = evidence / "synthetic_tracker_comparison.json"
          if synthetic_path.exists():
              synthetic = json.loads(synthetic_path.read_text(encoding="utf-8"))
              summary["synthetic_tracker_scenarios"] = {
                  item["scenario"]: {
                      "constant_position": item["summary"]["constant_position"],
                      "event_cloud_centroid": item["summary"]["event_cloud_centroid"],
                      "baseline": item["summary"]["baseline"],
                      "dvs_enact": item["summary"]["dvs_enact"],
                  }
                  for item in synthetic["scenarios"]
              }

          evidence.mkdir(parents=True, exist_ok=True)
          output = evidence / "evaluation_summary.json"
          output.write_text(json.dumps(summary, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(summary, indent=2))
          PY

      - name: Validate paper artifacts
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          evidence = Path("paper-output/data/paper_evidence")
          figures = Path("paper-output/figures")
          include_mevdt = "${{ inputs.include_mevdt }}" == "true"
          expected = [
              evidence / "artifact_manifest.json",
              evidence / "evaluation_summary.json",
              evidence / "synthetic_cube_activity.json",
              evidence / "synthetic_count_likelihood.json",
              evidence / "synthetic_tracker_comparison.json",
              figures / "synthetic_cube_activity.png",
              figures / "synthetic_count_likelihood_counts.png",
              figures / "synthetic_count_likelihood_nll.png",
              figures / "synthetic_tracker_inactive_axis_ratio.png",
              figures / "synthetic_tracker_collapse_fraction.png",
          ]
          if include_mevdt:
              expected.extend(
                  [
                      evidence / "mevdt_support_diagnostics.json",
                      evidence / "mevdt_tracker_comparison.json",
                      evidence / "mevdt_filtered_tracker_sweep.json",
                  ]
              )
          missing = [str(path) for path in expected if not path.exists()]
          if missing:
              raise SystemExit(f"Missing expected artifacts: {missing}")

          manifest = json.loads((evidence / "artifact_manifest.json").read_text(encoding="utf-8"))
          if manifest["summary"]["failed"]:
              raise SystemExit(f"Artifact manifest has failed stages: {manifest['summary']}")
          print(json.dumps({"validated": [str(path) for path in expected]}, indent=2))
          PY

      - name: Upload raw paper data artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ inputs.output_artifact_name }}
          path: paper-output/data/paper_evidence
          if-no-files-found: error
          retention-days: 30

  dispatch-paper-results:
    name: Dispatch paper repository build
    needs: export
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_paper_repo == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch paper repository build-results workflow
        env:
          PAPER_REPO_TOKEN: ${{ secrets.PAPER_REPO_TOKEN }}
          PAPER_REPO: FlorianPfaff/DVS-ENACT-Paper
          SOURCE_REPO: IPS-Stuttgart/DVS-ENACT
          SOURCE_RUN_ID: ${{ github.run_id }}
          ARTIFACT_NAME: ${{ inputs.output_artifact_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PAPER_REPO_TOKEN:-}" ]; then
            echo "::warning::publish_to_paper_repo=true but PAPER_REPO_TOKEN is not configured; skipping paper workflow dispatch"
            exit 0
          fi
          payload=$(python - <<'PY'
          import json
          import os

          print(json.dumps({
              "ref": "main",
              "inputs": {
                  "source_repo": os.environ["SOURCE_REPO"],
                  "source_run_id": os.environ["SOURCE_RUN_ID"],
                  "artifact_name": os.environ["ARTIFACT_NAME"],
              },
          }))
          PY
          )

          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${PAPER_REPO_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${PAPER_REPO}/actions/workflows/build-results.yml/dispatches" \
            -d "$payload"
