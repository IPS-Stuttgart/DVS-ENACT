name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    name: Tests and synthetic artifact smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out DVS-ENACT
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run synthetic-only paper artifact smoke test
        run: |
          python scripts/export_paper_artifacts.py \
            --skip-mevdt \
            --output-root "${GITHUB_WORKSPACE}/paper-smoke" \
            --synthetic-n-steps 4 \
            --synthetic-events-per-window 8 \
            --synthetic-total-events 48 \
            --max-events-per-window 8

      - name: Validate smoke artifacts
        run: |
          test -f paper-smoke/data/paper_evidence/artifact_manifest.json
          test -f paper-smoke/data/paper_evidence/synthetic_cube_activity.json
          test -f paper-smoke/data/paper_evidence/synthetic_count_likelihood.json
          test -f paper-smoke/data/paper_evidence/synthetic_tracker_comparison.json
          test -d paper-smoke/figures
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("paper-smoke/data/paper_evidence/artifact_manifest.json").read_text())
          summary = manifest["summary"]
          assert summary["failed"] == 0, summary
          assert summary["succeeded"] >= 3, summary
          assert summary["skipped"] >= 2, summary
          PY

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dvs-enact-paper-smoke-artifacts
          path: |
            paper-smoke/data/paper_evidence
            paper-smoke/figures
          if-no-files-found: warn
          retention-days: 14
